path: /housing/hello/by-id
method: GET
description: Fixture endpoint over the fixture_hello.greetings table (requires loaded data).
statement_timeout_seconds: 30
params:
  - name: id
    type: integer
    required: true
    min: 1
    max: 999999999
    description: Row id from the fixture_hello greetings table.
output:
  format: json
sql: |
  SELECT g.id, g.msg
  FROM greetings AS g
  WHERE g.id = :id
  LIMIT 1
