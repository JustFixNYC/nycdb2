# Set DBT_PROFILES_DIR to this directory, or copy into ~/.dbt/profiles.yml.
# Defaults match local Docker Compose in opendata-etl.
opendata_etl_nycdb2:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', '127.0.0.1') }}"
      user: "{{ env_var('POSTGRES_USER', 'opendata') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'opendata') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      dbname: "{{ env_var('POSTGRES_DB', 'opendata') }}"
      schema: "{{ env_var('DBT_TARGET_SCHEMA', 'nyc_housing') }}"
      threads: 4
